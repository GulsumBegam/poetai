<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poet — AI Poem Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0b0e;
            --bg-elevated: #161222;
            --card: #1c1726;
            --card-hover: #231e30;
            --border: #2e2640;
            --border-light: #3d3355;
            --fg: #e8dcc8;
            --fg-muted: #9a8f82;
            --fg-dim: #6b6060;
            --accent: #c9a55c;
            --accent-hover: #dbb76e;
            --accent-glow: rgba(201,165,92,0.15);
            --user-bubble: #2a2040;
            --poet-bubble: #1a1520;
            --poem-bg: #14101c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lora', Georgia, serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow: hidden;
        }

        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            background: linear-gradient(180deg, rgba(22,18,34,0.98) 0%, rgba(13,11,14,0.95) 100%);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }

        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), #8b6914);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #0d0b0e;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: quillPulse 3s ease-in-out infinite;
        }

        @keyframes quillPulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 30px rgba(201,165,92,0.3); }
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--accent), #e8d5a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--fg-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .app-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .sidebar-section {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-label {
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--fg-dim);
            margin-bottom: 0.75rem;
        }

        .style-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .style-btn {
            padding: 0.6rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--fg-muted);
            font-family: 'Lora', serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .style-btn:hover {
            border-color: var(--border-light);
            color: var(--fg);
            background: var(--card-hover);
        }

        .style-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .style-btn .style-icon {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .history-item {
            padding: 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 0.4rem;
        }

        .history-item:hover { background: var(--card); }

        .history-item-title {
            font-size: 0.85rem;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-style {
            font-size: 0.7rem;
            color: var(--fg-dim);
            margin-top: 0.2rem;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            animation: messageIn 0.4s ease-out;
            max-width: 85%;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .msg-avatar.poet-avatar {
            background: linear-gradient(135deg, var(--accent), #8b6914);
            color: #0d0b0e;
        }

        .msg-avatar.user-avatar {
            background: var(--border-light);
            color: var(--fg-muted);
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-name {
            font-size: 0.7rem;
            color: var(--fg-dim);
            margin-bottom: 0.35rem;
            letter-spacing: 0.05em;
        }

        .message.user .msg-name { text-align: right; }

        .msg-bubble {
            padding: 0.85rem 1.1rem;
            border-radius: 14px;
            font-size: 0.92rem;
            line-height: 1.65;
        }

        .message.poet .msg-bubble {
            background: var(--poet-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: var(--user-bubble);
            border: 1px solid var(--border-light);
            border-top-right-radius: 4px;
        }

        .poem-card {
            background: var(--poem-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .poem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .poem-card .poem-style-tag {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(201,165,92,0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-bottom: 0.75rem;
        }

        .poem-text {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 2;
            color: var(--fg);
            white-space: pre-line;
        }

        .poem-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .poem-action-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--fg-muted);
            font-family: 'Lora', serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .poem-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 0;
        }

        .typing-dot {
            width: 7px; height: 7px;
            background: var(--fg-dim);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(22,18,34,0.9) 0%, rgba(13,11,14,0.98) 100%);
            backdrop-filter: blur(12px);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--fg);
            font-family: 'Lora', serif;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }

        .chat-input::placeholder { color: var(--fg-dim); }
        .chat-input:focus { border-color: var(--accent); }

        .send-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #8b6914);
            border: none;
            color: #0d0b0e;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .mobile-styles {
            display: none;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
        }

        .mobile-styles::-webkit-scrollbar { display: none; }

        .mobile-style-pill {
            flex-shrink: 0;
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            color: var(--fg-muted);
            font-family: 'Lora', serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .mobile-style-pill.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.65rem 1.5rem;
            border-radius: 10px;
            font-size: 0.85rem;
            z-index: 100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.visible { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-styles { display: flex; }
            .message { max-width: 92%; }
            .app-header { padding: 0.6rem 1rem; }
            .chat-messages { padding: 1rem; }
            .chat-input-area { padding: 0.75rem 1rem; }
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .bg-blob-1 {
            width: 400px; height: 400px;
            background: rgba(201,165,92,0.05);
            top: -100px; right: -100px;
            animation: blobDrift1 20s ease-in-out infinite;
        }

        .bg-blob-2 {
            width: 300px; height: 300px;
            background: rgba(100,60,140,0.06);
            bottom: -80px; left: -80px;
            animation: blobDrift2 25s ease-in-out infinite;
        }

        @keyframes blobDrift1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 30px); }
        }

        @keyframes blobDrift2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -40px); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
        }

        .empty-state-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }

        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--fg-muted);
            font-size: 0.9rem;
            max-width: 360px;
            line-height: 1.6;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
            justify-content: center;
        }

        .suggestion-chip {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            color: var(--fg-muted);
            font-family: 'Lora', serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .poem-line {
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .poem-line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas" aria-hidden="true"></canvas>
    <div class="bg-blob bg-blob-1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob-2" aria-hidden="true"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="brand-icon" aria-hidden="true"><i class="fas fa-feather-pointed"></i></div>
            <div>
                <div class="brand-title">POET</div>
                <div class="brand-subtitle">AI Poem Generator</div>
            </div>
            <div style="flex:1"></div>
            <button id="clear-btn" class="poem-action-btn" title="Clear conversation" aria-label="Clear conversation">
                <i class="fas fa-rotate-right"></i> New Chat
            </button>
        </header>

        <div class="app-main">
            <aside class="sidebar" aria-label="Poem settings and history">

                    <div class="sidebar-label">Poem Style</div>
                    <div class="style-grid" id="style-grid">
                        <button class="style-btn active" data-style="free" aria-pressed="true"><span class="style-icon"><i class="fas fa-wind"></i></span>Free Verse</button>
                        <button class="style-btn" data-style="rhyming" aria-pressed="false"><span class="style-icon"><i class="fas fa-music"></i></span>Rhyming</button>
                        <button class="style-btn" data-style="haiku" aria-pressed="false"><span class="style-icon"><i class="fas fa-leaf"></i></span>Haiku</button>
                        <button class="style-btn" data-style="limerick" aria-pressed="false"><span class="style-icon"><i class="fas fa-face-grin-beam"></i></span>Limerick</button>
                        <button class="style-btn" data-style="ode" aria-pressed="false"><span class="style-icon"><i class="fas fa-landmark"></i></span>Ode</button>
                        <button class="style-btn" data-style="sonnet" aria-pressed="false"><span class="style-icon"><i class="fas fa-heart"></i></span>Sonnet</button>
                    </div>
                </div>
                <div class="sidebar-section" style="padding-bottom:0.5rem"><div class="sidebar-label">Recent Poems</div></div>
                <div class="history-list" id="history-list">
                    <div style="text-align:center;padding:2rem 0;color:var(--fg-dim);font-size:0.8rem;">No poems yet. Start a conversation!</div>
                </div>
            </aside>

            <section class="chat-area" aria-label="Chat with Poet">
                <div class="mobile-styles" id="mobile-styles">
                    <button class="mobile-style-pill active" data-style="free">Free Verse</button>
                    <button class="mobile-style-pill" data-style="rhyming">Rhyming</button>
                    <button class="mobile-style-pill" data-style="haiku">Haiku</button>
                    <button class="mobile-style-pill" data-style="limerick">Limerick</button>
                    <button class="mobile-style-pill" data-style="ode">Ode</button>
                    <button class="mobile-style-pill" data-style="sonnet">Sonnet</button>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-feather-pointed"></i></div>
                        <h2>Welcome to Poet</h2>
                        <p>Describe a feeling, scene, or idea, and I will craft a poem for you. Choose a style from the sidebar or let me decide.</p>
                        <div class="suggestion-chips">
                            <button class="suggestion-chip" data-prompt="A lonely lighthouse on a stormy night">Lonely lighthouse</button>
                            <button class="suggestion-chip" data-prompt="The warmth of a childhood memory">Childhood warmth</button>
                            <button class="suggestion-chip" data-prompt="Autumn leaves falling in a quiet garden">Autumn garden</button>
                            <button class="suggestion-chip" data-prompt="The feeling of hope after a long struggle">Hope after struggle</button>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea class="chat-input" id="chat-input" placeholder="Describe what you want a poem about..." rows="1" aria-label="Poem description input"></textarea>
                        <button class="send-btn" id="send-btn" aria-label="Send message"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div class="toast" id="toast" role="alert"></div>

    <script>
    // Particle System
    (function initParticles() {
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 60;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + 10;
                this.size = Math.random() * 2 + 0.5; this.speedY = -(Math.random() * 0.3 + 0.1);
                this.speedX = (Math.random() - 0.5) * 0.15; this.opacity = Math.random() * 0.4 + 0.1;
                this.wobbleAmp = Math.random() * 30 + 10; this.wobbleSpeed = Math.random() * 0.005 + 0.002;
                this.phase = Math.random() * Math.PI * 2; this.life = 0;
            }
            update() {
                this.life++; this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.life * this.wobbleSpeed + this.phase) * 0.3;
                if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) this.reset();
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(201,165,92,${this.opacity})`; ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate);
        }
        animate();
    })();

    // Poem Generation Engine
    const PoemEngine = {
        themeKeywords: {
            nature: ['tree','flower','river','mountain','ocean','forest','bird','sky','rain','sun','moon','star','wind','leaf','garden','bloom','spring','autumn','winter','summer','sea','lake','field','meadow','cloud','storm','dawn','dusk','sunset','sunrise','nature','earth','animal','butterfly','rose','petal','creek','stream','hill','valley','desert','sand','snow','ice','fire','wave','coral','reef','jungle','wolf','hawk','eagle','deer'],
            love: ['love','heart','kiss','embrace','passion','desire','beloved','romance','together','forever','tender','devotion','affection','soul','entwined','wedding','marry','partner','spouse','crush','adore','cherish','longing','yearn','intimate','warmth of','hold me','miss you','darling','dear','valentine','anniversary'],

                navigator.clipboard.writeText(poem.lines.join('\n')).then(() => {
                    this.showToast('Poem copied to clipboard'); const btn = e.currentTarget; btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                    setTimeout(() => { btn.innerHTML = '<i class="far fa-copy"></i> Copy'; }, 2000);
                }).catch(() => this.showToast('Could not copy — please select and copy manually'));
            });
            div.querySelector('.regen-btn').addEventListener('click', () => {
                if (this.isGenerating) return; const lastUserMsg = this.messages.filter(m => m.sender === 'user').pop();
                if (lastUserMsg) { div.remove(); this.isGenerating = true; this.showTyping();
                    setTimeout(async () => { try { const nP = PoemEngine.generate(lastUserMsg.text, this.currentStyle); this.hideTyping(); this.addPoemMessage(this.pickRandom(this.prePoem), nP, this.pickRandom(this.postPoem)); } catch (e) { this.hideTyping(); this.addMessage('poet', "The muse seems restless. Please try again."); } this.isGenerating = false; }, 1000 + Math.random() * 600); }
            });
            this.scrollToBottom();
        },
        showTyping() { const c = document.getElementById('chat-messages'); const d = document.createElement('div'); d.className = 'message poet'; d.id = 'typing-indicator'; d.innerHTML = `<div class="msg-avatar poet-avatar"><i class="fas fa-feather-pointed"></i></div><div class="msg-content"><div class="msg-name">Poet</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`; c.appendChild(d); this.scrollToBottom(); },
        hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); },
        scrollToBottom() { const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; },
        updateHistory() {
            const list = document.getElementById('history-list');
            if (this.poems.length === 0) { list.innerHTML = '<div style="text-align:center;padding:2rem 0;color:var(--fg-dim);font-size:0.8rem;">No poems yet. Start a conversation!</div>'; return; }
            list.innerHTML = this.poems.slice().reverse().map((p, i) => `<div class="history-item" data-index="${this.poems.length - 1 - i}"><div class="history-item-title">${this.escapeHtml(p.title)}</div><div class="history-item-style">${this.escapeHtml(p.style)}</div></div>`).join('');
            list.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const poem = this.poems[parseInt(item.dataset.index)]; if (!poem) return;
                    this.addMessage('poet', `Here is your poem about "${poem.title.replace(/\.\.\.$/, '')}":`);
                    const container = document.getElementById('chat-messages'); const div = document.createElement('div'); div.className = 'message poet';
                    const linesHtml = poem.lines.map(line => `<div class="poem-line visible">${this.escapeHtml(line)}</div>`).join('');
                    div.innerHTML = `<div class="msg-avatar poet-avatar"><i class="fas fa-feather-pointed"></i></div><div class="msg-content"><div class="msg-name">Poet</div><div class="msg-bubble"><div class="poem-card"><div class="poem-style-tag">${this.escapeHtml(poem.style)}</div><div class="poem-text">${linesHtml}</div><div class="poem-actions"><button class="poem-action-btn copy-btn" aria-label="Copy poem"><i class="far fa-copy"></i> Copy</button></div></div></div></div>`;
                    container.appendChild(div);
                    div.querySelector('.copy-btn').addEventListener('click', (e) => { navigator.clipboard.writeText(poem.lines.join('\n')).then(() => { this.showToast('Poem copied to clipboard'); const btn = e.currentTarget; btn.innerHTML = '<i class="fas fa-check"></i> Copied'; setTimeout(() => { btn.innerHTML = '<i class="far fa-copy"></i> Copy'; }, 2000); }); });
                    this.scrollToBottom();
                });
            });
        },
        clearChat() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = `<div class="empty-state" id="empty-state"><div class="empty-state-icon"><i class="fas fa-feather-pointed"></i></div><h2>Welcome to Poet</h2><p>Describe a feeling, scene, or idea, and I will craft a poem for you. Choose a style from the sidebar or let me decide.</p><div class="suggestion-chips"><button class="suggestion-chip" data-prompt="A lonely lighthouse on a stormy night">Lonely lighthouse</button><button class="suggestion-chip" data-prompt="The warmth of a childhood memory">Childhood warmth</button><button class="suggestion-chip" data-prompt="Autumn leaves falling in a quiet garden">Autumn garden</button><button class="suggestion-chip" data-prompt="The feeling of hope after a long struggle">Hope after struggle</button></div></div>`;
            document.querySelectorAll('.suggestion-chip').forEach(chip => { chip.addEventListener('click', () => { document.getElementById('chat-input').value = chip.dataset.prompt; this.sendMessage(); }); });
            this.messages = []; this.poems = []; this.updateHistory(); PoemEngine.usedCouplets = {};
        },
        showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500); },
        pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
        escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; },
        delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    };

    document.addEventListener('DOMContentLoaded', () => ChatApp.init());
    </script>
</body>
</html>
